x-shared-env: &shared-env
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: url_shortener
  DB_USERNAME: url_shortener
  DB_PASSWORD: secret
  SESSION_DRIVER: file
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: url_shortener
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U url_shortener -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    env_file:
      - ./api/.env
    environment:
      <<: *shared-env
      APP_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./api
    restart: unless-stopped
    entrypoint: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3"]
    env_file:
      - ./api/.env
    environment:
      <<: *shared-env
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
